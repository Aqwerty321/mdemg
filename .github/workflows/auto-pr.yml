name: Auto PR from Dev Branch

on:
  push:
    branches: [mdemg-dev01]

permissions:
  contents: read
  pull-requests: write

jobs:
  create-pr:
    name: Create or Update PR
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check for existing PR
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_URL=$(gh pr list --head mdemg-dev01 --base main --state open --json url --jq '.[0].url // empty')
          if [ -n "$PR_URL" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "url=$PR_URL" >> "$GITHUB_OUTPUT"
            echo "PR already exists: $PR_URL"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "No open PR found, will create one"
          fi

      - name: Build PR body from commits
        if: steps.check.outputs.exists == 'false'
        id: body
        run: |
          COMMIT_LOG=$(git log origin/main..HEAD --pretty=format:"- %s" 2>/dev/null || echo "- Initial dev branch push")
          {
            echo "body<<PREOF"
            echo "## Summary"
            echo ""
            echo "Development branch changes from \`mdemg-dev01\`."
            echo ""
            echo "### Commits"
            echo "$COMMIT_LOG"
            echo ""
            echo "---"
            echo "*Auto-generated PR from mdemg-dev01 push*"
            echo "PREOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create PR
        if: steps.check.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_BODY: ${{ steps.body.outputs.body }}
        run: |
          gh pr create \
            --head mdemg-dev01 \
            --base main \
            --title "dev: mdemg-dev01 -> main" \
            --body "$PR_BODY"
