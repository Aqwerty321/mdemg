name: CI

on:
  push:
    branches: [main, mdemg-dev01]
  pull_request:
    branches: [main]

env:
  GO_VERSION: '1.24'

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Build server
        run: go build -v -o bin/mdemg ./cmd/server

      - name: Build ingest-codebase
        run: go build -v -o bin/ingest-codebase ./cmd/ingest-codebase

      - name: Build MCP server
        run: go build -v -o bin/mdemg-mcp ./cmd/mcp-server

  test:
    name: Test
    runs-on: ubuntu-latest
    services:
      neo4j:
        image: neo4j:5
        env:
          NEO4J_AUTH: neo4j/testpassword
          NEO4J_PLUGINS: '["apoc"]'
        ports:
          - 7687:7687
    env:
      TEST_NEO4J_URI: bolt://localhost:7687
      TEST_NEO4J_USER: neo4j
      TEST_NEO4J_PASS: testpassword
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Run Unit Tests
        run: go test -v ./internal/...

      - name: Wait for Neo4j
        run: |
          timeout 60s bash -c 'until curl -s http://localhost:7687 > /dev/null; do sleep 2; done' || true
          # Note: Neo4j bolt port doesn't respond to HTTP, but we can check if it is open
          timeout 60s bash -c 'until printf "" 2>>/dev/null >/dev/tcp/localhost/7687; do sleep 2; done'
          # Additional wait for Neo4j to fully initialize
          sleep 5

      - name: Apply Neo4j migrations
        run: |
          # Install cypher-shell
          wget -q https://dist.neo4j.org/cypher-shell/cypher-shell-5.15.0.zip -O /tmp/cypher-shell.zip
          unzip -q /tmp/cypher-shell.zip -d /tmp
          chmod +x /tmp/cypher-shell-5.15.0/bin/cypher-shell

          # Apply each migration in order
          for migration in migrations/V*.cypher; do
            echo "Applying $migration..."
            /tmp/cypher-shell-5.15.0/bin/cypher-shell \
              -a bolt://localhost:7687 \
              -u neo4j \
              -p testpassword \
              --file "$migration"
          done

          # Verify schema version
          echo "Verifying schema version..."
          /tmp/cypher-shell-5.15.0/bin/cypher-shell \
            -a bolt://localhost:7687 \
            -u neo4j \
            -p testpassword \
            "MATCH (s:SchemaMeta {key:'schema'}) RETURN s.current_version AS version"

      - name: Build server for integration tests
        run: go build -o bin/mdemg ./cmd/server

      - name: Start MDEMG server
        run: |
          export NEO4J_URI=bolt://localhost:7687
          export NEO4J_USER=neo4j
          export NEO4J_PASS=testpassword
          export LISTEN_ADDR=:9999
          export PORT_RANGE_START=10000
          export PORT_RANGE_END=10099
          export PORT_FILE_PATH=.mdemg.port
          export EMBEDDING_PROVIDER=
          export REQUIRED_SCHEMA_VERSION=10
          ./bin/mdemg &

          # Wait for port file (server writes it after binding)
          timeout 30s bash -c 'until [ -f .mdemg.port ]; do sleep 1; done'
          MDEMG_PORT=$(cat .mdemg.port)
          echo "MDEMG_PORT=$MDEMG_PORT" >> "$GITHUB_ENV"
          echo "MDEMG server is ready on port $MDEMG_PORT"

      - name: Run Integration Tests
        run: go test -v -tags=integration ./tests/integration/...
        env:
          TEST_MDEMG_ENDPOINT: http://localhost:${{ env.MDEMG_PORT }}

      - name: Setup Python for UATS
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install UATS dependencies
        run: pip install requests jsonpath-ng

      - name: Run UATS Contract Tests
        continue-on-error: true  # Some specs require embedding provider (unavailable in CI)
        run: |
          python3 docs/api/api-spec/uats/runners/uats_runner.py validate-all \
            --spec-dir docs/api/api-spec/uats/specs/ \
            --base-url http://localhost:${{ env.MDEMG_PORT }}

      - name: Upload coverage
        uses: codecov/codecov-action@v5
        with:
          files: coverage.out
          fail_ci_if_error: false

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: latest
          args: --timeout=5m

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'
