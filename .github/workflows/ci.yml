name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  GO_VERSION: '1.24'

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Build server
        run: go build -v -o bin/mdemg ./cmd/server

      - name: Build ingest-codebase
        run: go build -v -o bin/ingest-codebase ./cmd/ingest-codebase

      - name: Build MCP server
        run: go build -v -o bin/mdemg-mcp ./cmd/mcp-server

  test:
    name: Test
    runs-on: ubuntu-latest
    services:
      neo4j:
        image: neo4j:5
        env:
          NEO4J_AUTH: neo4j/testpassword
          NEO4J_PLUGINS: '["apoc"]'
        ports:
          - 7687:7687
    env:
      TEST_NEO4J_URI: bolt://localhost:7687
      TEST_NEO4J_USER: neo4j
      TEST_NEO4J_PASS: testpassword
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Run Unit Tests
        run: go test -v ./internal/...

      - name: Wait for Neo4j
        run: |
          timeout 60s bash -c 'until curl -s http://localhost:7687 > /dev/null; do sleep 2; done' || true
          # Note: Neo4j bolt port doesn't respond to HTTP, but we can check if it is open
          timeout 60s bash -c 'until printf "" 2>>/dev/null >/dev/tcp/localhost/7687; do sleep 2; done'

      - name: Run Integration Tests
        run: go test -v -tags=integration ./tests/integration/...

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: coverage.out
          fail_ci_if_error: false

  lint:
    name: Lint
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          args: --timeout=5m

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'
