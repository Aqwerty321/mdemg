version: "2"

run:
  timeout: 5m
  modules-download-mode: readonly

linters:
  default: none
  enable:
    - govet
    - staticcheck
    - errcheck
    - ineffassign
    - unused
  settings:
    errcheck:
      exclude-functions:
        - (io.Closer).Close
        - (*net/http.Response).Body.Close
        - (net/http.ResponseWriter).Write
        - fmt.Fprint
        - fmt.Fprintf
        - fmt.Fprintln
        - (*encoding/json.Encoder).Encode
        - (*encoding/json.Decoder).Decode
    govet:
      enable:
        - nilness
      disable:
        - shadow
  exclusions:
    paths:
      - docs
      - archive
    rules:
      # Exclude linters from running on test files
      - path: _test\.go
        linters:
          - errcheck
          - govet
      # Exclude generated protobuf files
      - path: \.pb\.go
        linters:
          - all
      # Exclude errcheck from CLI tools and plugins (fire-and-forget binaries)
      - path: ^cmd/
        linters:
          - errcheck
      - path: ^plugins/
        linters:
          - errcheck

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
