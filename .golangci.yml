run:
  timeout: 5m
  modules-download-mode: readonly

linters:
  # Start with a minimal set - expand as codebase matures
  enable:
    - gosimple
    - govet
    - staticcheck

linters-settings:
  govet:
    enable:
      - nilness
      - unusedresult
    disable:
      - shadow  # Too many existing issues
  staticcheck:
    checks:
      - all
      - -SA1019  # Ignore deprecation warnings for now

issues:
  exclude-dirs:
    - docs
    - archeive
  exclude-rules:
    # Exclude linters from running on test files
    - path: _test\.go
      linters:
        - errcheck
        - govet
    # Exclude generated protobuf files
    - path: \.pb\.go
      linters:
        - all
  # Don't fail on existing issues - report only new
  max-issues-per-linter: 0
  max-same-issues: 0
