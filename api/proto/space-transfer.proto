syntax = "proto3";

package mdemg.transfer.v1;

option go_package = "mdemg/api/transferpb";

// =============================================================================
// Space Transfer Service
// Enables sharing mature MDEMG space graphs between developer environments.
// Uses streaming to handle large spaces (100k+ nodes) without OOM.
// =============================================================================

service SpaceTransfer {
    // Export streams all data for a space_id from source to caller.
    // Chunks are sent in order: metadata → nodes → edges → observations → symbols → summary.
    rpc Export(ExportRequest) returns (stream SpaceChunk);

    // Import receives streamed chunks and writes them to the target Neo4j.
    // Returns a summary of what was created/skipped/failed.
    rpc Import(stream SpaceChunk) returns (ImportResponse);

    // ListSpaces returns available spaces with node/edge counts and metadata.
    rpc ListSpaces(ListSpacesRequest) returns (ListSpacesResponse);

    // SpaceInfo returns detailed metadata for a single space (for pre-import validation).
    rpc SpaceInfo(SpaceInfoRequest) returns (SpaceInfoResponse);
}

// =============================================================================
// Export
// =============================================================================

message ExportRequest {
    string space_id = 1;                    // Required: space to export
    int32 chunk_size = 2;                   // Nodes per chunk (default: 500)
    bool include_embeddings = 3;            // Include embedding vectors (default: true, large!)
    bool include_observations = 4;          // Include observation nodes (default: true)
    bool include_symbols = 5;               // Include symbol nodes (default: true)
    bool include_learned_edges = 6;         // Include CO_ACTIVATED_WITH edges (default: true)
    int32 min_layer = 7;                    // Minimum layer to export (default: 0 = all)
    int32 max_layer = 8;                    // Maximum layer to export (default: 0 = all)
}

// =============================================================================
// Import
// =============================================================================

message ImportResponse {
    bool success = 1;
    ImportStats stats = 2;
    string error = 3;                       // Set if success == false
    repeated string warnings = 4;           // Non-fatal issues encountered
}

message ImportStats {
    int32 nodes_created = 1;
    int32 nodes_skipped = 2;                // Skipped due to conflict mode
    int32 nodes_overwritten = 3;
    int32 edges_created = 4;
    int32 edges_skipped = 5;
    int32 observations_created = 6;
    int32 symbols_created = 7;
    int64 duration_ms = 8;
}

// =============================================================================
// ListSpaces / SpaceInfo
// =============================================================================

message ListSpacesRequest {
    // Empty — returns all spaces
}

message ListSpacesResponse {
    repeated SpaceSummary spaces = 1;
}

message SpaceSummary {
    string space_id = 1;
    int64 node_count = 2;
    int64 edge_count = 3;
    int64 observation_count = 4;
    int64 symbol_count = 5;
    int32 max_layer = 6;                    // Highest layer present
    string last_updated = 7;                // ISO8601 of most recent node update
    int32 schema_version = 8;
}

message SpaceInfoRequest {
    string space_id = 1;
}

message SpaceInfoResponse {
    SpaceSummary summary = 1;
    int32 schema_version = 2;
    repeated string edge_types = 3;         // Distinct relationship types present
    repeated string role_types = 4;         // Distinct role_type values
    int64 embedding_dimensions = 5;         // Detected embedding size (e.g., 1536)
    map<string, int64> nodes_by_layer = 6;  // Node count per layer
}

// =============================================================================
// SpaceChunk — the unit of streaming transfer
// =============================================================================

message SpaceChunk {
    ChunkType chunk_type = 1;
    string space_id = 2;
    int32 schema_version = 3;
    int32 sequence = 4;                     // 0-based chunk index
    int32 total_chunks = 5;                 // -1 if unknown (live streaming)
    ConflictMode conflict_mode = 6;         // How to handle collisions on import

    // Exactly one of these is populated per chunk:
    SpaceMetadata metadata = 10;            // First chunk: space metadata
    NodeBatch nodes = 11;                   // Batch of memory nodes
    EdgeBatch edges = 12;                   // Batch of edges
    ObservationBatch observations = 13;     // Batch of observations
    SymbolBatch symbols = 14;               // Batch of symbol nodes
    TransferSummary summary = 15;           // Last chunk: export summary
}

enum ChunkType {
    CHUNK_TYPE_UNSPECIFIED = 0;
    CHUNK_TYPE_METADATA = 1;
    CHUNK_TYPE_NODES = 2;
    CHUNK_TYPE_EDGES = 3;
    CHUNK_TYPE_OBSERVATIONS = 4;
    CHUNK_TYPE_SYMBOLS = 5;
    CHUNK_TYPE_SUMMARY = 6;
}

enum ConflictMode {
    CONFLICT_SKIP = 0;                      // Default: skip existing nodes
    CONFLICT_OVERWRITE = 1;                 // Replace existing nodes
    CONFLICT_ERROR = 2;                     // Abort on first collision
}

// =============================================================================
// Chunk payloads
// =============================================================================

message SpaceMetadata {
    string space_id = 1;
    int32 schema_version = 2;
    string exported_at = 3;                 // ISO8601
    string source_host = 4;                 // Hostname of exporting machine
    int64 total_nodes = 5;
    int64 total_edges = 6;
    int64 total_observations = 7;
    int64 total_symbols = 8;
    int64 embedding_dimensions = 9;         // 1536 for OpenAI, 768 for Ollama, etc.
    map<string, string> labels = 10;        // Arbitrary metadata (e.g., "project": "whk-wms")
}

message NodeBatch {
    repeated NodeData nodes = 1;
}

message NodeData {
    string node_id = 1;
    string space_id = 2;
    string path = 3;
    string name = 4;
    int32 layer = 5;
    string role_type = 6;
    int32 version = 7;
    string description = 8;
    string summary = 9;
    double confidence = 10;
    string sensitivity = 11;
    repeated string tags = 12;
    repeated float embedding = 13;          // float32 vector
    string user_id = 14;
    string visibility = 15;
    bool volatile = 16;
    bool is_archived = 17;
    string created_at = 18;                 // ISO8601
    string updated_at = 19;                 // ISO8601
    map<string, string> extra_properties = 20; // Catch-all for future properties

    // Hidden layer fields
    repeated float message_pass_embedding = 21;
    string last_forward_pass = 22;
    string last_backward_pass = 23;
    int32 aggregation_count = 24;
    double stability_score = 25;

    // CMS fields
    string content = 26;
    string obs_type = 27;
    double surprise_score = 28;
    string session_id = 29;
    string agent_id = 30;
    int32 member_count = 31;
    string dominant_obs_type = 32;
    double avg_surprise_score = 33;
    repeated string keywords = 34;
    int32 session_count = 35;
}

message EdgeBatch {
    repeated EdgeData edges = 1;
}

message EdgeData {
    string from_node_id = 1;
    string to_node_id = 2;
    string rel_type = 3;                    // ASSOCIATED_WITH, CO_ACTIVATED_WITH, GENERALIZES, etc.
    string space_id = 4;
    string edge_id = 5;
    double weight = 6;
    double initial_weight = 7;
    int32 evidence_count = 8;
    string created_at = 9;
    string updated_at = 10;
    string last_activated = 11;
    map<string, string> extra_properties = 12;
}

message ObservationBatch {
    repeated ObservationData observations = 1;
}

message ObservationData {
    string obs_id = 1;
    string space_id = 2;
    string content = 3;
    string source = 4;
    string timestamp = 5;
    repeated float embedding = 6;
    string created_at = 7;
    string parent_node_id = 8;              // MemoryNode this observation belongs to
    map<string, string> extra_properties = 9;
}

message SymbolBatch {
    repeated SymbolData symbols = 1;
}

message SymbolData {
    string symbol_id = 1;
    string space_id = 2;
    string name = 3;
    string symbol_type = 4;                 // constant, function, class, etc.
    string file_path = 5;
    int32 line = 6;
    int32 line_end = 7;
    bool exported = 8;
    string parent = 9;
    string signature = 10;
    string value = 11;
    string doc_comment = 12;
    string language = 13;
    repeated float embedding = 14;
    string parent_node_id = 15;             // MemoryNode this symbol belongs to
    map<string, string> extra_properties = 16;
}

message TransferSummary {
    int64 nodes_exported = 1;
    int64 edges_exported = 2;
    int64 observations_exported = 3;
    int64 symbols_exported = 4;
    int64 bytes_total = 5;                  // Approximate total bytes transferred
    int64 duration_ms = 6;
    string completed_at = 7;                // ISO8601
}
