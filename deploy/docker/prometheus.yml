# Prometheus Configuration for MDEMG
# Phase 48.5 - Benchmarking & Monitoring

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'mdemg-monitor'

# Alertmanager configuration (optional - enable when alertmanager is deployed)
# alerting:
#   alertmanagers:
#     - static_configs:
#         - targets:
#           - alertmanager:9093

# Load alert rules
rule_files:
  - /etc/prometheus/alerts/*.yaml

scrape_configs:
  # MDEMG API metrics
  - job_name: 'mdemg-api'
    metrics_path: /v1/prometheus
    scrape_interval: 15s
    static_configs:
      # Use host.docker.internal for local dev, mdemg:8080 for docker-compose prod
      - targets: ['host.docker.internal:9999']
        labels:
          service: 'mdemg'
          env: 'development'
    # Handle API authentication if enabled
    # bearer_token: '${MDEMG_METRICS_TOKEN}'

  # Service Health Probes (via Blackbox Exporter)
  # Monitors HTTP endpoints for services that don't expose Prometheus metrics
  - job_name: 'service-health'
    metrics_path: /probe
    params:
      module: [http_2xx]
    scrape_interval: 15s
    static_configs:
      - targets:
          - http://host.docker.internal:9999/healthz    # MDEMG API
          - http://host.docker.internal:7474            # Neo4j Browser
        labels:
          env: 'development'
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox:9115

  # TCP connectivity probes
  - job_name: 'tcp-health'
    metrics_path: /probe
    params:
      module: [tcp_connect]
    scrape_interval: 15s
    static_configs:
      - targets:
          - host.docker.internal:7687    # Neo4j Bolt
          - host.docker.internal:9999    # MDEMG API
        labels:
          env: 'development'
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox:9115

  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
        labels:
          service: 'prometheus'
