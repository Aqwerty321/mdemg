# MDEMG Latency SLO Alerting Rules
# Prometheus alerting rules for latency SLO compliance

groups:
  - name: mdemg_slo
    interval: 30s
    rules:
      # P95 Latency SLO: 250ms
      - alert: MDEMGHighP95Latency
        expr: |
          histogram_quantile(0.95,
            sum(rate(mdemg_http_request_duration_seconds_bucket{path="/v1/memory/retrieve"}[5m])) by (le)
          ) > 0.250
        for: 5m
        labels:
          severity: warning
          team: platform
        annotations:
          summary: "MDEMG P95 latency exceeds SLO"
          description: "P95 latency is {{ $value | humanizeDuration }} (SLO: 250ms)"
          runbook_url: "https://mdemg.dev/runbooks/high-latency"

      # P99 Latency Critical
      - alert: MDEMGCriticalP99Latency
        expr: |
          histogram_quantile(0.99,
            sum(rate(mdemg_http_request_duration_seconds_bucket{path="/v1/memory/retrieve"}[5m])) by (le)
          ) > 0.500
        for: 2m
        labels:
          severity: critical
          team: platform
        annotations:
          summary: "MDEMG P99 latency critical"
          description: "P99 latency is {{ $value | humanizeDuration }} (threshold: 500ms)"

      # Error Rate SLO: 0.1%
      - alert: MDEMGHighErrorRate
        expr: |
          sum(rate(mdemg_http_requests_total{status=~"5.."}[5m])) /
          sum(rate(mdemg_http_requests_total[5m])) * 100 > 0.1
        for: 5m
        labels:
          severity: warning
          team: platform
        annotations:
          summary: "MDEMG error rate exceeds SLO"
          description: "Error rate is {{ $value | printf \"%.2f\" }}% (SLO: 0.1%)"

      # Circuit Breaker Open
      - alert: MDEMGCircuitBreakerOpen
        expr: mdemg_circuit_breaker_state == 1
        for: 1m
        labels:
          severity: warning
          team: platform
        annotations:
          summary: "Circuit breaker open for {{ $labels.service }}"
          description: "Circuit breaker for {{ $labels.service }} is open, requests failing"

      # Rate Limiting Active
      - alert: MDEMGRateLimitingActive
        expr: rate(mdemg_rate_limit_rejected_total[5m]) > 10
        for: 2m
        labels:
          severity: info
          team: platform
        annotations:
          summary: "High rate limit rejections"
          description: "Rate limiting is rejecting {{ $value | printf \"%.0f\" }} requests/sec"

      # Health Check Failing
      - alert: MDEMGHealthCheckFailing
        expr: up{job="mdemg-api"} == 0
        for: 1m
        labels:
          severity: critical
          team: platform
        annotations:
          summary: "MDEMG health check failing"
          description: "MDEMG instance {{ $labels.instance }} is not responding"

      # Low Cache Hit Ratio
      - alert: MDEMGLowCacheHitRatio
        expr: mdemg_cache_hit_ratio{cache="query"} < 0.5
        for: 10m
        labels:
          severity: info
          team: platform
        annotations:
          summary: "Query cache hit ratio low"
          description: "Cache hit ratio is {{ $value | printf \"%.1f\" }} (expected > 0.5)"
