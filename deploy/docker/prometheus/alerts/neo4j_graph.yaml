# MDEMG Neo4j Graph Health Alerting Rules
# Monitors per-space graph health, orphan counts, and container resources

groups:
  - name: mdemg_neo4j_graph
    interval: 60s
    rules:
      # Low graph health score (orphan ratio + edge density)
      - alert: MDEMGLowGraphHealth
        expr: mdemg_neo4j_graph_health_score < 0.5
        for: 10m
        labels:
          severity: warning
          team: platform
        annotations:
          summary: "Graph health low for space {{ $labels.space_id }}"
          description: "Health score is {{ $value | printf \"%.2f\" }} (threshold: 0.5) for space {{ $labels.space_id }}"

      # High orphan count per space
      - alert: MDEMGHighOrphanCount
        expr: mdemg_neo4j_graph_orphans > 50
        for: 15m
        labels:
          severity: warning
          team: platform
        annotations:
          summary: "High orphan count in space {{ $labels.space_id }}"
          description: "{{ $value }} orphan nodes in space {{ $labels.space_id }}. Consider running graph-orphan cleanup."

      # Orphan ratio exceeds 10%
      - alert: MDEMGHighOrphanRatio
        expr: mdemg_neo4j_graph_orphans / mdemg_neo4j_graph_nodes > 0.10
        for: 15m
        labels:
          severity: warning
          team: platform
        annotations:
          summary: "Orphan ratio exceeds 10% for space {{ $labels.space_id }}"
          description: "{{ $value | printf \"%.1f\" }}% of nodes are orphans in space {{ $labels.space_id }}"

      # Neo4j container high memory usage (>80% of limit)
      - alert: MDEMGNeo4jHighMemory
        expr: mdemg_neo4j_container_mem_percent > 80
        for: 5m
        labels:
          severity: warning
          team: platform
        annotations:
          summary: "Neo4j container memory usage high"
          description: "Neo4j container using {{ $value | printf \"%.0f\" }}% of memory limit"

      # Neo4j container high CPU
      - alert: MDEMGNeo4jHighCPU
        expr: mdemg_neo4j_container_cpu_percent > 80
        for: 5m
        labels:
          severity: warning
          team: platform
        annotations:
          summary: "Neo4j container CPU usage high"
          description: "Neo4j container at {{ $value | printf \"%.0f\" }}% CPU"

      # Neo4j connection pool exhaustion
      - alert: MDEMGNeo4jPoolExhausted
        expr: mdemg_neo4j_pool_waiting_requests > 5
        for: 2m
        labels:
          severity: critical
          team: platform
        annotations:
          summary: "Neo4j connection pool waiting requests"
          description: "{{ $value }} requests waiting for Neo4j connections"

      # Graph node count dropping (possible data loss)
      - alert: MDEMGGraphNodeDrop
        expr: |
          (mdemg_neo4j_graph_nodes offset 1h) - mdemg_neo4j_graph_nodes > 100
        for: 5m
        labels:
          severity: critical
          team: platform
        annotations:
          summary: "Significant node count drop in space {{ $labels.space_id }}"
          description: "Node count dropped by {{ $value }} in the last hour for space {{ $labels.space_id }}"
