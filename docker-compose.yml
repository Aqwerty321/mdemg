services:
  neo4j:
    image: neo4j:5
    container_name: mdemg-neo4j
    ports:
      - "7474:7474"   # Browser
      - "7687:7687"   # Bolt
    environment:
      NEO4J_AUTH: "neo4j/testpassword"
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_memory_pagecache_size: "4G"
      NEO4J_dbms_memory_heap_initial__size: "2G"
      NEO4J_dbms_memory_heap_max__size: "4G"
      NEO4J_dbms_memory_transaction_total_max: "4G"
      NEO4J_dbms_security_procedures_unrestricted: "apoc.*"
      NEO4J_dbms_security_procedures_allowlist: "apoc.*"
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "testpassword", "RETURN 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  neo4j-monitor:
    image: python:3.11-slim
    container_name: mdemg-neo4j-monitor
    depends_on:
      - neo4j
    restart: unless-stopped
    volumes:
      - ./scripts:/scripts:ro
      - ./logs:/logs
    command:
      [
        "python",
        "/scripts/monitor_container.py",
        "--container",
        "mdemg-neo4j",
        "--interval",
        "2",
        "--log",
        "/logs/neo4j_monitor.log",
        "--max-lines",
        "20000",
        "--max-bytes",
        "5242880"
      ]

volumes:
  neo4j_data:
  neo4j_logs:
